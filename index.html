<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="FlowState">
<meta name="theme-color" content="#F5F6F8">
<title>FlowState</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon.png">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#F5F6F8;--white:#FFFFFF;--surface:#FFFFFF;--surface2:#F0F1F3;
  --border:rgba(0,0,0,0.07);--border2:rgba(0,0,0,0.12);
  --shadow:0 1px 3px rgba(0,0,0,0.06),0 4px 16px rgba(0,0,0,0.04);
  --shadow-md:0 2px 8px rgba(0,0,0,0.08),0 8px 24px rgba(0,0,0,0.06);
  --text:#111318;--text2:#6B7280;--text3:#9CA3AF;
  --accent:#2A7055;--accent-light:#EBF5EF;--accent-mid:#4A9A78;
  --red:#EF4444;--red-light:#FEF2F2;
  --orange:#F59E0B;--orange-light:#FFFBEB;
  --blue:#3B82F6;--blue-light:#EFF6FF;
  --safe:env(safe-area-inset-bottom,0px);
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;-webkit-font-smoothing:antialiased;overflow-x:hidden;font-size:15px}
.app{max-width:430px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column}

.hdr{padding:14px 20px;display:flex;justify-content:space-between;align-items:center;background:rgba(245,246,248,0.92);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);position:sticky;top:0;z-index:20;border-bottom:1px solid var(--border)}
.logo{font-family:'Syne',sans-serif;font-weight:800;font-size:18px;letter-spacing:-.6px;color:var(--text)}
.logo b{color:var(--accent)}
.hpill{font-size:11px;font-family:'Syne',sans-serif;font-weight:700;letter-spacing:.2px;padding:5px 12px;border-radius:20px;background:var(--surface2);color:var(--text3);transition:.25s;border:none}
.hpill.on{background:var(--accent-light);color:var(--accent)}

.main{flex:1;display:flex;flex-direction:column;padding-bottom:calc(72px + var(--safe))}
.screen{animation:fadeUp .2s ease both}
@keyframes fadeUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}

.loading-wrap{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px}
.dots{display:flex;gap:7px}
.dot{width:8px;height:8px;border-radius:50%;background:var(--accent);animation:blink 1.3s ease-in-out infinite}
.dot:nth-child(2){animation-delay:.2s}.dot:nth-child(3){animation-delay:.4s}
@keyframes blink{0%,100%{opacity:.15;transform:scale(.75)}50%{opacity:1;transform:scale(1)}}
.loading-txt{font-size:13px;color:var(--text3);font-style:italic}

/* DUMP */
.dump{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px 22px}
.eyebrow{font-size:11px;font-family:'Syne',sans-serif;font-weight:700;text-transform:uppercase;letter-spacing:2px;color:var(--accent);margin-bottom:14px}
.dump h1{font-family:'Syne',sans-serif;font-weight:800;font-size:26px;line-height:1.2;text-align:center;margin-bottom:8px}
.dump-sub{font-size:13px;color:var(--text3);text-align:center;margin-bottom:26px;line-height:1.7}
.box{width:100%;background:var(--white);border-radius:18px;overflow:hidden;box-shadow:var(--shadow-md);border:1px solid var(--border);transition:box-shadow .2s}
.box:focus-within{box-shadow:0 0 0 3px rgba(42,112,85,.12),var(--shadow-md)}
textarea{width:100%;background:transparent;border:none;outline:none;color:var(--text);font-family:'DM Sans',sans-serif;font-size:14px;font-weight:300;padding:18px 20px;min-height:150px;resize:none;line-height:1.85}
textarea::placeholder{color:var(--text3)}
.box-foot{padding:10px 14px 14px;display:flex;justify-content:space-between;align-items:center;gap:8px;flex-wrap:wrap;border-top:1px solid var(--border)}
.wc{font-size:12px;color:var(--text3)}
.box-actions{display:flex;gap:8px;align-items:center}
.mic-btn{background:var(--surface2);border:none;color:var(--text2);font-family:'Syne',sans-serif;font-weight:700;font-size:12px;padding:9px 14px;border-radius:10px;cursor:pointer;transition:.15s;display:flex;align-items:center;gap:5px}
.mic-btn:hover{background:var(--accent-light);color:var(--accent)}
.mic-btn.listening{background:var(--red-light);color:var(--red);animation:pulse 1.2s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.65}}
.go{font-family:'Syne',sans-serif;font-weight:700;font-size:13px;background:var(--accent);color:#fff;border:none;padding:10px 22px;border-radius:10px;cursor:pointer;transition:.15s}
.go:disabled{opacity:.3;cursor:default}
.go:hover:not(:disabled){background:#1E5C44;box-shadow:0 4px 14px rgba(42,112,85,.3)}
.link-btn{background:none;border:none;color:var(--accent);font-family:'Syne',sans-serif;font-weight:700;font-size:13px;padding:10px 0;cursor:pointer;text-align:center;width:100%;margin-top:8px}
.link-btn:hover{color:#1E5C44}
.ghost{background:none;border:1px solid var(--border);color:var(--text2);font-family:'Syne',sans-serif;font-weight:700;font-size:12px;padding:9px 16px;border-radius:10px;cursor:pointer;transition:.15s}
.ghost:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-light)}

/* PAGE HEADER */
.page-hdr{padding:20px 22px 10px;display:flex;justify-content:space-between;align-items:baseline}
.page-hdr h2{font-family:'Syne',sans-serif;font-weight:800;font-size:22px;color:var(--text)}
.page-hdr .sub{font-size:12px;color:var(--text3)}

/* TASK LIST */
.task-list{padding:0 16px 8px}
.section-label{font-family:'Syne',sans-serif;font-weight:700;font-size:11px;text-transform:uppercase;letter-spacing:1.2px;padding:14px 4px 7px;color:var(--text3)}

/* TASK CARD */
.task-card{background:var(--white);border-radius:16px;margin-bottom:10px;box-shadow:var(--shadow);border:1px solid var(--border);overflow:hidden;transition:box-shadow .2s}
.task-card.selected{box-shadow:0 0 0 2px var(--accent),var(--shadow-md);border-color:transparent}
.task-card.done-card{box-shadow:none;border-color:var(--border);background:var(--surface2)}
.task-card.editing{box-shadow:0 0 0 2px var(--orange),var(--shadow-md);border-color:transparent}
.task-main{display:flex;align-items:stretch;min-height:66px}
.task-cb-wrap{width:50px;display:flex;align-items:center;justify-content:center;flex-shrink:0;cursor:pointer;border-right:1px solid var(--border);transition:background .15s}
.task-cb-wrap:hover{background:var(--accent-light)}
.task-cb{width:20px;height:20px;border-radius:50%;border:2px solid var(--border2);background:none;display:flex;align-items:center;justify-content:center;transition:.2s;pointer-events:none}
.task-cb-wrap:hover .task-cb{border-color:var(--accent)}
.task-cb.checked{background:var(--accent);border-color:var(--accent)}
.task-cb.checked::after{content:'✓';font-size:11px;color:#fff;font-weight:700;line-height:1}
.task-content{flex:1;padding:13px 12px 13px 14px;cursor:pointer;min-width:0}
.task-top{display:flex;align-items:center;gap:9px;margin-bottom:6px}
.score-badge{font-family:'Syne',sans-serif;font-weight:700;font-size:11px;padding:3px 9px;border-radius:20px;flex-shrink:0}
.task-name{font-size:14px;color:var(--text);line-height:1.4;font-weight:400}
.task-name.done-txt{color:var(--text3);font-weight:300;text-decoration:line-through}
.task-sub{display:flex;gap:6px;flex-wrap:wrap;align-items:center}
.etag{font-size:11px;font-weight:500;padding:2px 8px;border-radius:20px}
.dur-tag{font-size:11px;color:var(--text3)}
.sched-tag{font-size:11px;font-weight:500}

/* EDIT INPUT */
.edit-wrap{padding:12px 14px;border-top:1px solid var(--border);background:var(--orange-light)}
.edit-label{font-size:10px;font-family:'Syne',sans-serif;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--orange);margin-bottom:7px}
.edit-inp{width:100%;background:var(--white);border:1.5px solid var(--orange);color:var(--text);font-family:'DM Sans',sans-serif;font-size:14px;font-weight:400;padding:10px 12px;border-radius:10px;outline:none;line-height:1.5}
.edit-inp:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(42,112,85,.1)}
.edit-actions{display:flex;gap:7px;margin-top:8px}
.edit-save{background:var(--accent);border:none;color:#fff;font-family:'Syne',sans-serif;font-weight:700;font-size:12px;padding:8px 18px;border-radius:8px;cursor:pointer;transition:.15s}
.edit-save:hover{background:#1E5C44}
.edit-cancel{background:none;border:1px solid var(--border);color:var(--text3);font-family:'Syne',sans-serif;font-weight:700;font-size:12px;padding:8px 14px;border-radius:8px;cursor:pointer;transition:.15s}
.edit-cancel:hover{border-color:var(--red);color:var(--red)}

/* ACTION ROW */
.task-actions-row{display:flex;align-items:center;border-top:1px solid var(--border);background:var(--bg)}
.tac-btn{flex:1;background:none;border:none;border-right:1px solid var(--border);color:var(--text3);font-family:'Syne',sans-serif;font-weight:700;font-size:11px;padding:11px 4px;cursor:pointer;transition:.15s;display:flex;align-items:center;justify-content:center;gap:4px}
.tac-btn:last-child{border-right:none}
.tac-btn:hover{color:var(--text);background:rgba(0,0,0,.03)}
.tac-btn.up:hover,.tac-btn.dn:hover{color:var(--accent);background:var(--accent-light)}
.tac-btn.focus-btn{background:var(--accent-light);color:var(--accent);font-size:12px}
.tac-btn.focus-btn:hover{background:var(--accent);color:#fff}
.tac-btn.edit-btn:hover{color:var(--orange);background:var(--orange-light)}
.tac-btn.del-btn:hover{color:var(--red);background:var(--red-light)}

/* BREAKDOWN */
.task-breakdown{padding:12px 16px 14px;border-top:1px solid var(--border);background:var(--bg)}
.bd-title{font-size:11px;font-family:'Syne',sans-serif;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--blue);margin-bottom:10px}
.bd-step{display:flex;gap:10px;padding:6px 0;border-bottom:1px solid var(--border)}
.bd-step:last-child{border-bottom:none}
.bd-num{font-size:11px;color:var(--accent);font-family:'Syne',sans-serif;font-weight:700;flex-shrink:0;width:16px;margin-top:2px}
.bd-txt{font-size:13px;color:var(--text2);line-height:1.5;font-weight:300}

/* DONE CARD */
.done-restore-row{display:flex;align-items:center;padding:0 14px 0 0;gap:6px;flex-shrink:0}
.icon-btn{background:none;border:1px solid var(--border);color:var(--text3);font-size:13px;padding:6px 10px;border-radius:8px;cursor:pointer;transition:.15s}
.icon-btn.restore:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-light)}
.icon-btn.del:hover{border-color:var(--red);color:var(--red);background:var(--red-light)}

/* AGENDA */
.agenda-toggle{display:flex;gap:0;margin:0 22px 14px;background:var(--surface2);border-radius:10px;padding:3px}
.atog-btn{flex:1;background:none;border:none;color:var(--text3);font-family:'Syne',sans-serif;font-weight:700;font-size:11px;padding:7px;border-radius:8px;cursor:pointer;transition:.15s}
.atog-btn.on{background:var(--white);color:var(--accent);box-shadow:var(--shadow)}
.day-nav{display:flex;align-items:center;gap:12px;padding:0 22px 12px}
.day-btn{background:var(--white);border:1px solid var(--border);color:var(--text2);font-size:16px;width:38px;height:38px;border-radius:12px;cursor:pointer;flex-shrink:0;transition:.15s;display:flex;align-items:center;justify-content:center;box-shadow:var(--shadow)}
.day-btn:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-light)}
.day-center{flex:1;text-align:center}
.day-name{font-family:'Syne',sans-serif;font-weight:800;font-size:17px;color:var(--text)}
.day-date{font-size:12px;color:var(--text3);margin-top:2px}
.shift-pill{display:inline-block;font-family:'Syne',sans-serif;font-weight:700;font-size:10px;text-transform:uppercase;letter-spacing:.8px;color:var(--accent);background:var(--accent-light);padding:3px 10px;border-radius:20px;margin-top:5px}
.agenda-body{padding:0 16px 12px}
.slot-block{background:var(--white);border-radius:16px;padding:14px 16px;margin-bottom:10px;box-shadow:var(--shadow);border:1px solid var(--border)}
.slot-block.slot-past{opacity:.5;filter:grayscale(.3)}
.slot-header{display:flex;align-items:center;gap:8px;margin-bottom:12px;padding-bottom:10px;border-bottom:1px solid var(--border)}
.slot-time{font-family:'Syne',sans-serif;font-weight:700;font-size:12px;color:var(--accent)}
.slot-label{font-size:11px;color:var(--text3);font-weight:400}
.slot-free{margin-left:auto;font-size:11px;color:var(--text3);background:var(--surface2);padding:2px 8px;border-radius:10px}
.slot-empty{font-size:13px;color:var(--text3);font-weight:300;padding:2px 0}
.agenda-task{display:flex;align-items:flex-start;gap:10px;padding:9px 0;border-bottom:1px solid var(--border)}
.agenda-task:last-child{border-bottom:none;padding-bottom:0}
.atask-check{background:none;border:2px solid var(--border2);color:var(--text3);width:24px;height:24px;min-width:24px;border-radius:50%;cursor:pointer;font-size:10px;transition:.15s;display:flex;align-items:center;justify-content:center;margin-top:1px}
.atask-check:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-light)}
.atask-body{flex:1;min-width:0}
.atask-time{font-size:11px;color:var(--text3);margin-bottom:2px}
.atask-note{font-size:10px;color:var(--accent);font-family:'Syne',sans-serif;font-weight:700;font-style:normal}
.atask-txt{font-size:13.5px;color:var(--text);line-height:1.4}
.atask-right{display:flex;flex-direction:column;align-items:flex-end;gap:5px;flex-shrink:0}
.score-dot{width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-weight:700;font-size:9px}

/* MAANDKALENDER */
.month-nav{display:flex;align-items:center;gap:12px;padding:0 22px 14px}
.month-name{font-family:'Syne',sans-serif;font-weight:800;font-size:17px;color:var(--text);flex:1;text-align:center}
.cal-grid{padding:0 16px 12px}
.cal-weekdays{display:grid;grid-template-columns:repeat(7,1fr);margin-bottom:4px}
.cal-wd{font-family:'Syne',sans-serif;font-weight:700;font-size:10px;text-transform:uppercase;letter-spacing:.5px;color:var(--text3);text-align:center;padding:6px 0}
.cal-days{display:grid;grid-template-columns:repeat(7,1fr);gap:3px}
.cal-day{background:var(--white);border-radius:10px;padding:6px 4px;min-height:52px;border:1px solid var(--border);cursor:pointer;transition:.15s;position:relative}
.cal-day:hover{border-color:var(--accent);background:var(--accent-light)}
.cal-day.today{border-color:var(--accent);background:var(--accent-light)}
.cal-day.selected-day{background:var(--accent);border-color:var(--accent)}
.cal-day.other-month{opacity:.35}
.cal-day.sunday{background:var(--surface2);cursor:default}
.cal-day.sunday:hover{border-color:var(--border);background:var(--surface2)}
.cal-day-num{font-family:'Syne',sans-serif;font-weight:700;font-size:12px;color:var(--text);text-align:center;margin-bottom:3px}
.cal-day.today .cal-day-num{color:var(--accent)}
.cal-day.selected-day .cal-day-num{color:#fff}
.cal-dots{display:flex;flex-wrap:wrap;gap:2px;justify-content:center}
.cal-dot{width:5px;height:5px;border-radius:50%;flex-shrink:0}
.cal-day.selected-day .cal-dot{background:rgba(255,255,255,.7)!important}
.rest-day{text-align:center;padding:70px 24px}
.rest-title{font-family:'Syne',sans-serif;font-weight:800;font-size:20px;margin-bottom:8px;color:var(--text)}
.rest-sub{font-size:13px;color:var(--text3);line-height:1.7;font-weight:300}

/* IDEEËN */
.idea-list{padding:0 16px 8px}
.group-label{font-family:'Syne',sans-serif;font-weight:700;font-size:11px;text-transform:uppercase;letter-spacing:1.2px;padding:14px 4px 7px;color:var(--accent)}
.idea-card{background:var(--white);border-radius:14px;padding:14px 16px;margin-bottom:8px;box-shadow:var(--shadow);border:1px solid var(--border);transition:.15s}
.idea-card.editing{box-shadow:0 0 0 2px var(--orange),var(--shadow-md);border-color:transparent}
.idea-card:hover{box-shadow:var(--shadow-md)}
.idea-top{display:flex;gap:12px;align-items:flex-start}
.idea-body{flex:1;min-width:0}
.idea-txt{font-size:14px;color:var(--text);line-height:1.5;margin-bottom:7px}
.pot-tag{font-size:11px;font-weight:500;padding:3px 9px;border-radius:20px}
.idea-actions{display:flex;gap:5px;flex-shrink:0;margin-top:2px}
.idea-btn{background:none;border:1px solid var(--border);color:var(--text3);font-size:12px;padding:5px 9px;border-radius:8px;cursor:pointer;transition:.15s}
.idea-btn.edit:hover{border-color:var(--orange);color:var(--orange);background:var(--orange-light)}
.idea-btn.del:hover{border-color:var(--red);color:var(--red);background:var(--red-light)}
.idea-edit-wrap{margin-top:10px;padding-top:10px;border-top:1px solid var(--border)}

/* FOCUS */
.focus{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px 22px;position:relative;overflow:hidden;background:var(--white)}
.focus-bg{position:absolute;inset:0;background:radial-gradient(ellipse at 50% 0%,rgba(42,112,85,.07) 0%,transparent 65%);pointer-events:none}
.glow{position:absolute;inset:0;pointer-events:none;opacity:0;transition:opacity 2s}
.glow.active{opacity:1}
.glow::after{content:'';position:absolute;left:50%;top:40%;transform:translate(-50%,-50%);width:320px;height:320px;border-radius:50%;background:radial-gradient(circle,rgba(42,112,85,.08) 0%,transparent 70%);animation:breathe 4s ease-in-out infinite}
@keyframes breathe{0%,100%{transform:translate(-50%,-50%) scale(.88);opacity:.5}50%{transform:translate(-50%,-50%) scale(1.1);opacity:1}}
.focus-eye{font-size:11px;font-family:'Syne',sans-serif;font-weight:700;text-transform:uppercase;letter-spacing:2px;color:var(--text3);margin-bottom:8px;z-index:1}
.focus-task{font-family:'Syne',sans-serif;font-weight:800;font-size:20px;text-align:center;max-width:300px;line-height:1.3;margin-bottom:6px;z-index:1;color:var(--text)}
.focus-none{font-family:'Syne',sans-serif;font-size:15px;color:var(--text3);text-align:center;margin-bottom:32px;z-index:1;font-weight:300}
.focus-energy{font-size:11px;text-transform:uppercase;letter-spacing:.8px;font-family:'Syne',sans-serif;font-weight:700;margin-bottom:14px;z-index:1}
.focus-startschot{background:var(--accent-light);border:1px solid rgba(42,112,85,.15);border-radius:14px;padding:14px 16px;margin-bottom:20px;z-index:1;width:100%;max-width:340px}
.startschot-label{font-size:10px;font-family:'Syne',sans-serif;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;color:var(--accent);margin-bottom:10px}
.startschot-step{display:flex;gap:10px;padding:5px 0;border-bottom:1px solid rgba(42,112,85,.1)}
.startschot-step:last-child{border-bottom:none}
.ss-num{font-size:11px;color:var(--accent);font-family:'Syne',sans-serif;font-weight:700;flex-shrink:0;width:16px;margin-top:2px}
.ss-txt{font-size:12.5px;color:#2A5A45;line-height:1.55}
.rw{position:relative;z-index:1;margin-bottom:6px}
.ring{transform:rotate(-90deg)}
.rbg{fill:none;stroke:var(--surface2);stroke-width:3}
.rfill{fill:none;stroke:var(--accent);stroke-width:3;stroke-linecap:round;transition:stroke-dashoffset 1s linear}
.rov{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.rtime{font-family:'Syne',sans-serif;font-weight:800;font-size:40px;letter-spacing:-2px;line-height:1;color:var(--text)}
.rlabel{font-size:10px;font-family:'Syne',sans-serif;font-weight:700;text-transform:uppercase;letter-spacing:2px;color:var(--text3);margin-top:5px}
.trow{display:flex;gap:8px;margin:10px 0 16px;z-index:1;flex-wrap:wrap;justify-content:center}
.tbtn{background:var(--surface2);border:none;color:var(--text2);font-family:'Syne',sans-serif;font-weight:700;font-size:12px;padding:10px 20px;border-radius:10px;cursor:pointer;transition:.15s}
.tbtn.go{background:var(--accent);color:#fff}
.tbtn.go:hover{background:#1E5C44;box-shadow:0 4px 14px rgba(42,112,85,.3)}
.tbtn.cancel-btn{background:var(--red-light);color:var(--red)}
.tbtn.cancel-btn:hover{background:var(--red);color:#fff}
.tbtn:disabled{opacity:.3;cursor:default}

.abtn.on{background:var(--accent);color:#fff}
.park-zone{width:100%;max-width:340px;z-index:1}

.pplus{font-size:18px;color:var(--accent);line-height:1}

.ptally{margin-top:8px;text-align:center;font-size:12px;color:var(--text3)}

.done-card{background:var(--white);border-radius:24px;padding:28px 24px;max-width:320px;width:100%;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,.2)}
.done-icon{font-size:36px;margin-bottom:14px}

.done-close:hover{background:#1E5C44}

.nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;background:rgba(245,246,248,0.92);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-top:1px solid var(--border);display:flex;padding:8px 12px calc(8px + var(--safe)) 12px;gap:4px;z-index:30}
.nb{flex:1;background:none;border:none;color:var(--text3);font-family:'Syne',sans-serif;font-weight:700;font-size:9px;text-transform:uppercase;letter-spacing:.5px;padding:8px 4px 7px;border-radius:10px;cursor:pointer;transition:.15s;position:relative}
.nb.on{color:var(--accent);background:var(--accent-light)}
.nb:hover:not(.on){color:var(--text2);background:var(--surface2)}
.nb:disabled{opacity:.3;cursor:default}
.nbadge{position:absolute;top:4px;right:6px;background:var(--red);color:#fff;border-radius:8px;font-size:8px;padding:1px 4px;font-family:'Syne',sans-serif;font-weight:700;line-height:1.4}
.empty{padding:60px 24px;text-align:center}
.empty-ico{font-size:32px;margin-bottom:14px;opacity:.25}
.empty-t{font-size:14px;color:var(--text2);font-weight:500}
.empty-s{font-size:12px;color:var(--text3);margin-top:6px;font-weight:300}
</style>
</head>
<body>
<div class="app">
  <header class="hdr">
    <div class="logo"><b>flow</b>state</div>
    <div class="hpill" id="hpill">klaar</div>
  </header>
  <main class="main" id="main"></main>
  <nav class="nav">
    <button class="nb on" id="n0" onclick="nav('dump')">Dump</button>
    <button class="nb" id="n1" onclick="nav('taken')">Taken<span id="tbadge" class="nbadge" style="display:none"></span></button>
    <button class="nb" id="n2" onclick="nav('agenda')">Agenda</button>
    <button class="nb" id="n3" onclick="nav('ideeen')">Ideeën</button>
    <button class="nb" id="n4" onclick="nav('focus')" disabled>Focus<span id="pbadge" class="nbadge" style="display:none"></span></button>
  </nav>
</div>
<script>
const REF_MONDAY=new Date(2026,2,30);
const DAYS=['Zondag','Maandag','Dinsdag','Woensdag','Donderdag','Vrijdag','Zaterdag'];
const MONTHS=['januari','februari','maart','april','mei','juni','juli','augustus','september','oktober','november','december'];
const CIRC=2*Math.PI*50;
const $=id=>document.getElementById(id);

function scoreColor(s){
  if(s>=4.5)return{bg:'#FEE2E2',fg:'#DC2626'};
  if(s>=3.5)return{bg:'#FEF3C7',fg:'#D97706'};
  if(s>=2.5)return{bg:'#D1FAE5',fg:'#059669'};
  return{bg:'#F3F4F6',fg:'#9CA3AF'};
}
const EC={high:{bg:'#FEE2E2',fg:'#DC2626'},medium:{bg:'#EFF6FF',fg:'#3B82F6'},low:{bg:'#D1FAE5',fg:'#059669'}};
const PC={high:{bg:'#D1FAE5',fg:'#059669'},medium:{bg:'#EFF6FF',fg:'#3B82F6'},low:{bg:'#F3F4F6',fg:'#9CA3AF'}};

// ── STATE ──
let screen='dump', dumpText='';
let tasks=[], ideas=[], parked=[];
let task=null, taskObj=null, taskEnergy='medium';
let parkInput='', showPark=false;
let secs=25*60, maxSecs=25*60, running=false, timerInterval=null;
let audioCtx=null, noiseNode=null, noiseActive=false, noiseType='brown';
let showDone=false, sessionDone=[];
let agendaDate=new Date(); agendaDate.setHours(0,0,0,0);
let agendaView='dag'; // 'dag' | 'maand'
let calMonth=new Date(); calMonth.setDate(1); calMonth.setHours(0,0,0,0);
let recognition=null, listening=false;
let parkRec=null, parkListening=false;
let selectedTaskId=null, editingTaskId=null, editingIdeaId=null;
let _idC=Date.now();
const genId=()=>_idC++;

// ── STORAGE ──
function saveState(){
  try{
    localStorage.setItem('fs5_tasks',JSON.stringify(tasks));
    localStorage.setItem('fs5_ideas',JSON.stringify(ideas));
    localStorage.setItem('fs5_parked',JSON.stringify(parked));
    localStorage.setItem('fs5_dump',dumpText);
    localStorage.setItem('fs5_order',JSON.stringify(tasks.map(t=>t.id)));
    if(task)localStorage.setItem('fs5_task',JSON.stringify({text:task,energy:taskEnergy,breakdown:taskObj?.breakdown||[]}));
    else localStorage.removeItem('fs5_task');
  }catch(e){}
}
function loadState(){
  tasks=JSON.parse(localStorage.getItem('fs5_tasks')||'[]');
  ideas=JSON.parse(localStorage.getItem('fs5_ideas')||'[]');
  parked=JSON.parse(localStorage.getItem('fs5_parked')||'[]');
  dumpText=localStorage.getItem('fs5_dump')||'';
  const st=localStorage.getItem('fs5_task');
  if(st){const t=JSON.parse(st);task=t.text;taskEnergy=t.energy||'medium';taskObj={text:t.text,energy:t.energy,breakdown:t.breakdown||[]};}
  const order=JSON.parse(localStorage.getItem('fs5_order')||'[]');
  if(order.length>0){
    const map=Object.fromEntries(tasks.map(t=>[t.id,t]));
    const ordered=order.map(id=>map[id]).filter(Boolean);
    const rest=tasks.filter(t=>!order.includes(t.id));
    tasks=[...ordered,...rest];
  }
}

// ── SHIFT ──
function getMonday(d){const r=new Date(d);const day=r.getDay();r.setDate(r.getDate()-(day===0?6:day-1));r.setHours(0,0,0,0);return r;}
function getShift(date){const mon=getMonday(date);const wk=Math.round((mon-REF_MONDAY)/(7*864e5));return wk%2===0?'vroeg':'laat';}

// ── TIME UTILS ──
function nowMins(){const n=new Date();return n.getHours()*60+n.getMinutes();}
function timeMins(t){const[h,m]=t.split(':').map(Number);return h*60+m;}
function addMins(t,m){const[h,min]=t.split(':').map(Number);const tot=h*60+min+m;return`${String(Math.floor(tot/60)).padStart(2,'0')}:${String(tot%60).padStart(2,'0')}`;}
function fmtDate(d){return`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;}
function dispDate(ds){
  const d=new Date(ds+'T00:00:00');const today=new Date();today.setHours(0,0,0,0);
  const tom=new Date(today);tom.setDate(today.getDate()+1);
  if(d.getTime()===today.getTime())return'Vandaag';
  if(d.getTime()===tom.getTime())return'Morgen';
  return`${DAYS[d.getDay()].slice(0,3)} ${d.getDate()}/${d.getMonth()+1}`;
}

function getFreeSlots(date){
  const day=date.getDay();
  if(day===0)return[];
  if(day===6)return[{start:'13:00',end:'17:00',dur:240,label:'Namiddag'}];
  const shift=getShift(date);
  if(shift==='vroeg')return[{start:'13:30',end:'14:00',dur:30,label:'Voor sport'},{start:'16:00',end:'19:30',dur:210,label:'Na sport'}];
  return[{start:'07:00',end:'08:00',dur:60,label:'Vroege ochtend'},{start:'10:30',end:'12:00',dur:90,label:'Na sport'}];
}
function isSlotAvailable(date,slot){
  const today=new Date();today.setHours(0,0,0,0);
  if(date.getTime()!==today.getTime())return true;
  return timeMins(slot.end)>nowMins();
}
function slotAvailableMins(date,slot){
  const today=new Date();today.setHours(0,0,0,0);
  if(date.getTime()!==today.getTime())return slot.dur;
  const now=nowMins();return Math.max(0,timeMins(slot.end)-Math.max(timeMins(slot.start),now));
}

// ── SCORE ──
function taskScore(t){
  return Math.round((Math.min(5,Math.max(1,t.urgencyScore||1))+Math.min(5,Math.max(1,t.importanceScore||1)))/2*10)/10;
}

// ── SCHEDULING ──
function scheduleAll(){
  const today=new Date();today.setHours(0,0,0,0);
  const pending=tasks.filter(t=>!t.completed);
  tasks.forEach(t=>{t.scheduledDate=null;t.scheduledTime=null;});
  let idx=0;
  for(let off=0;off<30&&idx<pending.length;off++){
    const d=new Date(today);d.setDate(today.getDate()+off);
    const slots=getFreeSlots(d);const ds=fmtDate(d);
    for(const sl of slots){
      if(idx>=pending.length)break;
      if(!isSlotAvailable(d,sl))continue;
      let left=slotAvailableMins(d,sl);
      const effStart=d.getTime()===today.getTime()?addMins(sl.start,Math.max(0,nowMins()-timeMins(sl.start))):sl.start;
      let used=0;
      while(idx<pending.length&&left>=10){
        const t=pending[idx];const dur=t.duration||30;
        if(dur<=left){t.scheduledDate=ds;t.scheduledTime=addMins(effStart,used);used+=dur;left-=dur;idx++;}
        else break;
      }
    }
  }
  saveState();
}

// ── TASK ACTIONS ──
function completeTask(id){
  const t=tasks.find(x=>x.id===id);if(!t)return;
  t.completed=true;sessionDone.push(t.text);
  if(task===t.text)showDone=true;
  selectedTaskId=null;scheduleAll();render();
}
function restoreTask(id){const t=tasks.find(x=>x.id===id);if(!t)return;t.completed=false;scheduleAll();render();}
function deleteTask(id){tasks=tasks.filter(x=>x.id!==id);selectedTaskId=null;editingTaskId=null;scheduleAll();render();}
function moveTask(id,dir){
  const idx=tasks.findIndex(t=>t.id===id);if(idx===-1)return;
  const newIdx=idx+dir;if(newIdx<0||newIdx>=tasks.length)return;
  [tasks[idx],tasks[newIdx]]=[tasks[newIdx],tasks[idx]];
  saveState();render();
}
function startEditTask(id){editingTaskId=id;selectedTaskId=id;render();setTimeout(()=>{const inp=$('edit-inp-'+id);if(inp){inp.focus();inp.setSelectionRange(inp.value.length,inp.value.length);}},50);}
function saveEditTask(id){
  const inp=$('edit-inp-'+id);if(!inp)return;
  const t=tasks.find(x=>x.id===id);if(t&&inp.value.trim()){t.text=inp.value.trim();}
  editingTaskId=null;saveState();scheduleAll();render();
}
function cancelEditTask(){editingTaskId=null;render();}

// Direct focus — no schedule check needed
function setFocus(id){
  const t=tasks.find(x=>x.id===id);if(!t)return;
  task=t.text;taskEnergy=t.energy||'medium';taskObj=t;
  secs=t.energy==='low'?15*60:25*60;maxSecs=secs;
  running=false;clearInterval(timerInterval);
  selectedTaskId=null;saveState();nav('focus');
}
function cancelFocus(){
  task=null;taskObj=null;running=false;clearInterval(timerInterval);
  if(noiseNode&&noiseActive){noiseNode.src.stop();noiseNode=null;noiseActive=false;}
  localStorage.removeItem('fs5_task');nav('taken');
}

// ── IDEA ACTIONS ──
function deleteIdea(id){ideas=ideas.filter(x=>x.id!==id);editingIdeaId=null;saveState();render();}
function startEditIdea(id){editingIdeaId=id;render();setTimeout(()=>{const inp=$('idea-inp-'+id);if(inp){inp.focus();inp.setSelectionRange(inp.value.length,inp.value.length);}},50);}
function saveEditIdea(id){
  const inp=$('idea-inp-'+id);if(!inp)return;
  const idea=ideas.find(x=>x.id===id);if(idea&&inp.value.trim()){idea.text=inp.value.trim();}
  editingIdeaId=null;saveState();render();
}
function cancelEditIdea(){editingIdeaId=null;render();}

// ── PARKING ──
function addParked(txt){
  const t=txt||parkInput;if(!t.trim())return;
  parked.push({id:genId(),txt:t.trim(),time:new Date().toLocaleTimeString('nl-BE',{hour:'2-digit',minute:'2-digit'})});
  parkInput='';showPark=false;saveState();render();
}
function rmParked(id){parked=parked.filter(p=>p.id!==id);saveState();render();}

// ── TRIAGE ──
async function runTriage(){
  if(!dumpText.trim())return;
  screen='loading';render();
  try{
    const res=await fetch('/api/triage',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({text:dumpText})});
    const data=await res.json();
    const base=genId();
    (data.tasks||[]).forEach((t,i)=>{
      tasks.push({id:base+i,text:t.text,energy:t.energy||'medium',urgencyScore:Math.min(5,Math.max(1,t.urgencyScore||2)),importanceScore:Math.min(5,Math.max(1,t.importanceScore||2)),duration:t.duration||30,breakdown:t.breakdown||[],completed:false,source:'dump',scheduledDate:null,scheduledTime:null});
    });
    (data.ideas||[]).forEach((id,i)=>{
      ideas.push({id:base+100+i,text:id.text,subcategory:id.subcategory||'Overig',potential:id.potential||'medium',importance:id.importance||'medium'});
    });
    dumpText='';localStorage.removeItem('fs5_dump');
    const newIds=new Set((data.tasks||[]).map((_,i)=>base+i));
    const newT=tasks.filter(t=>newIds.has(t.id)).sort((a,b)=>taskScore(b)-taskScore(a));
    tasks=[...newT,...tasks.filter(t=>!newIds.has(t.id))];
    scheduleAll();screen='taken';
  }catch(e){alert('Triage mislukt.');screen='dump';}
  render();
}

// ── AUDIO ──
function initAudio(){if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();}
function makeBrown(){
  const buf=audioCtx.createBuffer(1,audioCtx.sampleRate*4,audioCtx.sampleRate);
  const d=buf.getChannelData(0);let last=0;
  for(let i=0;i<d.length;i++){const w=(Math.random()*2-1)*0.02;d[i]=last=(last+w)/1.02;d[i]*=3.5;}
  const src=audioCtx.createBufferSource();src.buffer=buf;src.loop=true;
  const g=audioCtx.createGain();g.gain.value=0.07;src.connect(g);g.connect(audioCtx.destination);src.start();return{src,g};
}
function makeBinaural(){
  const L=audioCtx.createOscillator(),R=audioCtx.createOscillator();
  const m=audioCtx.createChannelMerger(2),g=audioCtx.createGain();
  g.gain.value=0.05;L.frequency.value=200;R.frequency.value=240;
  L.connect(m,0,0);R.connect(m,0,1);m.connect(g);g.connect(audioCtx.destination);
  L.start();R.start();return{src:{stop:()=>{L.stop();R.stop()}},g};
}
function toggleNoise(type){
  initAudio();
  if(noiseNode&&noiseActive&&noiseType===type){noiseNode.src.stop();noiseNode=null;noiseActive=false;}
  else{if(noiseNode&&noiseActive)noiseNode.src.stop();noiseType=type;noiseNode=type==='brown'?makeBrown():makeBinaural();noiseActive=true;}
  render();
}

// ── TIMER ──
function fmt(s){return`${String(Math.floor(s/60)).padStart(2,'0')}:${String(s%60).padStart(2,'0')}`;}
function startTimer(){
  if(!task)return;running=true;clearInterval(timerInterval);
  timerInterval=setInterval(()=>{
    if(secs>0){secs--;tickTimer();}
    else{clearInterval(timerInterval);running=false;if(task)sessionDone.push(task);showDone=true;render();}
  },1000);render();
}
function pauseTimer(){running=false;clearInterval(timerInterval);render();}
function resetTimer(){running=false;clearInterval(timerInterval);secs=maxSecs;render();}
function tickTimer(){
  const rt=$('rtime');if(rt)rt.textContent=fmt(secs);
  const rf=$('rfill');if(rf)rf.setAttribute('stroke-dashoffset',(CIRC*(secs/maxSecs)).toFixed(2));
  updateHeader();
}

// ── SPEECH ──
function setupSpeech(onResult,onEnd){
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SR)return null;
  const r=new SR();r.lang='nl-NL';r.continuous=true;r.interimResults=false;
  r.onresult=e=>{const txt=Array.from(e.results).slice(e.resultIndex).map(x=>x[0].transcript).join(' ');onResult(txt);};
  r.onerror=()=>onEnd&&onEnd();r.onend=()=>onEnd&&onEnd();return r;
}
function toggleMic(){
  if(listening){stopMic();return;}
  if(!recognition)recognition=setupSpeech(
    txt=>{dumpText=(dumpText+' '+txt).trim();const ta=$('dta');if(ta)ta.value=dumpText;const wcel=$('wc');if(wcel)wcel.textContent=dumpText.trim().split(/\s+/).filter(Boolean).length+' woorden';const gb=$('gobtn');if(gb)gb.disabled=!dumpText.trim();},
    ()=>{if(listening)recognition.start();}
  );
  if(!recognition){alert('Gebruik Safari op je iPhone voor spraak.');return;}
  recognition.start();listening=true;
  const b=$('micbtn'),i=$('micico'),l=$('miclab');
  if(b)b.classList.add('listening');if(i)i.textContent='⏹';if(l)l.textContent='Stop';
}
function stopMic(){
  if(recognition)recognition.stop();listening=false;
  const b=$('micbtn'),i=$('micico'),l=$('miclab');
  if(b)b.classList.remove('listening');if(i)i.textContent='🎙';if(l)l.textContent='Inspreken';
}
let parkTranscript='';
function toggleParkMic(){
  if(parkListening){stopParkMic();return;}
  parkTranscript='';
  if(!parkRec)parkRec=setupSpeech(
    txt=>{parkTranscript=(parkTranscript+' '+txt).trim();const pi=$('park-transcript');if(pi)pi.textContent=parkTranscript||'Luisteren...';},
    ()=>{if(parkListening)parkRec.start();}
  );
  if(!parkRec){alert('Gebruik Safari voor spraak.');return;}
  parkRec.start();parkListening=true;showPark=true;render();
}
function stopParkMic(){
  if(parkRec)parkRec.stop();parkListening=false;
  if(parkTranscript.trim()){addParked(parkTranscript.trim());parkTranscript='';}
  else{showPark=false;render();}
}

// ── NAVIGATION ──
function nav(s){
  if(s==='focus'&&!task)return;
  screen=s;selectedTaskId=null;editingTaskId=null;editingIdeaId=null;
  ['n0','n1','n2','n3','n4'].forEach(id=>$(id)?.classList.remove('on'));
  const map={dump:'n0',taken:'n1',agenda:'n2',ideeen:'n3',focus:'n4'};
  $(map[s])?.classList.add('on');render();
}
function updateHeader(){
  const p=$('hpill');if(!p)return;
  if(screen==='focus'&&running){p.textContent='● Focus actief';p.classList.add('on');}
  else if(task){p.textContent=task.length>22?task.slice(0,22)+'…':task;p.classList.remove('on');}
  else{p.textContent='klaar';p.classList.remove('on');}
  const tb=$('tbadge');const pc=tasks.filter(t=>!t.completed).length;
  if(tb){if(pc>0){tb.style.display='';tb.textContent=pc;}else tb.style.display='none';}
  const pb=$('pbadge');
  if(pb){if(parked.length>0){pb.style.display='';pb.textContent=parked.length;}else pb.style.display='none';}
  $('n4')&&($('n4').disabled=!task);
}

// ── RENDER MAIN ──
function render(){
  updateHeader();const m=$('main');
  document.querySelectorAll('.done-overlay').forEach(e=>e.remove());
  if(showDone&&sessionDone.length>0){
    const ol=document.createElement('div');ol.className='done-overlay';
    ol.innerHTML=`<div class="done-card">
      <div class="done-icon">✓</div>
      <div class="done-title">Sessie voltooid</div>
      <div class="done-sub">Wat je vandaag wél hebt gedaan — dat telt.</div>
      <div class="done-list">${sessionDone.map(t=>`<div class="done-item"><span class="done-check">✓</span><span>${t}</span></div>`).join('')}</div>
      <button class="done-close" onclick="showDone=false;render()">Verder gaan →</button>
    </div>`;
    document.body.appendChild(ol);
  }
  if(screen==='loading'){m.innerHTML=`<div class="loading-wrap screen"><div class="dots"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div><div class="loading-txt">gedachten structureren...</div></div>`;return;}
  if(screen==='dump'){rDump(m);return;}
  if(screen==='taken'){rTaken(m);return;}
  if(screen==='agenda'){rAgenda(m);return;}
  if(screen==='ideeen'){rIdeeen(m);return;}
  if(screen==='focus'){rFocus(m);return;}
}

// ── DUMP ──
function rDump(m){
  const wc=dumpText.trim().split(/\s+/).filter(Boolean).length;
  const pc=tasks.filter(t=>!t.completed).length;
  m.innerHTML=`<div class="dump screen">
    <div class="eyebrow">Ochtend dump</div>
    <h1>Wat zit er<br>in je hoofd?</h1>
    <p class="dump-sub">Dump alles — geen filter.<br>De AI sorteert het voor je.</p>
    <div class="box">
      <textarea id="dta" placeholder="Taken, zorgen, ideeën, ruis...">${dumpText}</textarea>
      <div class="box-foot">
        <span class="wc" id="wc">${wc} woorden</span>
        <div class="box-actions">
          <button class="mic-btn" id="micbtn" onclick="toggleMic()"><span id="micico">🎙</span><span id="miclab">Inspreken</span></button>
          <button class="go" id="gobtn" onclick="runTriage()" ${!dumpText.trim()?'disabled':''}>Structureer →</button>
        </div>
      </div>
    </div>
    ${pc>0?`<button class="link-btn" onclick="nav('taken')">${pc} openstaande taken →</button>`:''}
  </div>`;
  const ta=$('dta');
  ta.addEventListener('input',e=>{
    dumpText=e.target.value;
    const w=dumpText.trim().split(/\s+/).filter(Boolean).length;
    const wcel=$('wc');if(wcel)wcel.textContent=w+' woorden';
    const gb=$('gobtn');if(gb)gb.disabled=!dumpText.trim();
  });
}

// ── TAKEN ──
function rTaken(m){
  const pending=tasks.filter(t=>!t.completed);
  const done=tasks.filter(t=>t.completed);
  m.innerHTML=`<div class="taken screen">
    <div class="page-hdr"><h2>Taken</h2><span class="sub">${pending.length} open · ${done.length} gedaan</span></div>
    <div class="task-list">
      ${pending.length===0&&done.length===0?`<div class="empty"><div class="empty-ico">✓</div><div class="empty-t">Geen taken</div><div class="empty-s">Dump gedachten om taken toe te voegen</div></div>`:''}
      ${pending.map((t,i)=>tcardHTML(t,i,pending.length)).join('')}
      ${done.length>0?`<div class="section-label">Gedaan (${done.length})</div>${done.slice().reverse().map(t=>doneCardHTML(t)).join('')}`:''}
    </div>
  </div>`;
  // Bind edit inputs after render
  pending.forEach(t=>{
    if(editingTaskId===t.id){
      const inp=$('edit-inp-'+t.id);
      if(inp){
        inp.addEventListener('keydown',e=>{
          if(e.key==='Enter'){e.preventDefault();saveEditTask(t.id);}
          if(e.key==='Escape'){cancelEditTask();}
        });
      }
    }
  });
}

function tcardHTML(t,i,total){
  const s=taskScore(t);const sc=scoreColor(s);
  const ec=EC[t.energy]||EC.medium;
  const sel=selectedTaskId===t.id;
  const isEditing=editingTaskId===t.id;
  const has=t.breakdown&&t.breakdown.length>0;
  const sd=t.scheduledDate?`<span class="sched-tag" style="color:${sc.fg}">${dispDate(t.scheduledDate)} ${t.scheduledTime||''} <span style="color:var(--text3);font-weight:300">(richtlijn)</span></span>`:'';

  return`<div class="task-card ${sel&&!isEditing?'selected':''} ${isEditing?'editing':''}">
    <div class="task-main">
      <div class="task-cb-wrap" onclick="completeTask(${t.id})">
        <div class="task-cb"></div>
      </div>
      <div class="task-content" onclick="if(editingTaskId!==${t.id}){selectedTaskId=selectedTaskId===${t.id}?null:${t.id};render();}">
        <div class="task-top">
          <span class="score-badge" style="background:${sc.bg};color:${sc.fg}">${s.toFixed(1)}/5</span>
          <span class="task-name">${t.text}</span>
        </div>
        <div class="task-sub">
          <span class="etag" style="background:${ec.bg};color:${ec.fg}">${t.energy}</span>
          <span class="dur-tag">${t.duration||30}m</span>
          ${sd}
        </div>
      </div>
    </div>
    ${isEditing?`<div class="edit-wrap">
      <div class="edit-label">✏ Taak herschrijven</div>
      <textarea class="edit-inp" id="edit-inp-${t.id}" rows="2" style="resize:none">${t.text}</textarea>
      <div class="edit-actions">
        <button class="edit-save" onclick="saveEditTask(${t.id})">Opslaan</button>
        <button class="edit-cancel" onclick="cancelEditTask()">Annuleer</button>
      </div>
    </div>`:
    sel?`<div class="task-actions-row">
      <button class="tac-btn up" onclick="moveTask(${t.id},-1)" ${i===0?'disabled':''}>↑ Urgenter</button>
      <button class="tac-btn dn" onclick="moveTask(${t.id},1)" ${i===total-1?'disabled':''}>↓ Minder</button>
      <button class="tac-btn focus-btn" onclick="setFocus(${t.id})">▶ Focus</button>
      <button class="tac-btn edit-btn" onclick="startEditTask(${t.id})">✏</button>
      <button class="tac-btn del-btn" onclick="deleteTask(${t.id})">✕</button>
    </div>`:''}
    ${sel&&has&&!isEditing?`<div class="task-breakdown">
      <div class="bd-title">Aanpak — stap voor stap</div>
      ${t.breakdown.map((s,i)=>`<div class="bd-step"><span class="bd-num">${i+1}</span><span class="bd-txt">${s}</span></div>`).join('')}
    </div>`:''}
  </div>`;
}

function doneCardHTML(t){
  const s=taskScore(t);const sc=scoreColor(s);
  return`<div class="task-card done-card">
    <div class="task-main">
      <div class="task-cb-wrap" onclick="restoreTask(${t.id})">
        <div class="task-cb checked"></div>
      </div>
      <div class="task-content" style="cursor:default">
        <div class="task-top">
          <span class="score-badge" style="background:${sc.bg};color:${sc.fg};opacity:.5">${s.toFixed(1)}/5</span>
          <span class="task-name done-txt">${t.text}</span>
        </div>
      </div>
      <div class="done-restore-row">
        <button class="icon-btn restore" onclick="restoreTask(${t.id})" title="Terugzetten">↩</button>
        <button class="icon-btn del" onclick="deleteTask(${t.id})" title="Verwijderen">✕</button>
      </div>
    </div>
  </div>`;
}

// ── AGENDA ──
function rAgenda(m){
  m.innerHTML=`<div class="agenda screen">
    <div class="page-hdr" style="padding-bottom:14px"><h2>Agenda</h2><span class="sub">${agendaView==='dag'?'Dagview':'Maandview'}</span></div>
    <div class="agenda-toggle">
      <button class="atog-btn ${agendaView==='dag'?'on':''}" onclick="agendaView='dag';render()">Dag</button>
      <button class="atog-btn ${agendaView==='maand'?'on':''}" onclick="agendaView='maand';render()">Maand</button>
    </div>
    <div id="agenda-content"></div>
  </div>`;
  const ac=$('agenda-content');
  if(agendaView==='dag')rAgendaDag(ac);
  else rAgendaMaand(ac);
}

function rAgendaDag(container){
  const today=new Date();today.setHours(0,0,0,0);
  const day=agendaDate.getDay();const shift=getShift(agendaDate);
  const slots=getFreeSlots(agendaDate);const ds=fmtDate(agendaDate);
  const dayTasks=tasks.filter(t=>!t.completed&&t.scheduledDate===ds).sort((a,b)=>taskScore(b)-taskScore(a));
  const doneDayTasks=tasks.filter(t=>t.completed&&t.scheduledDate===ds);
  const isToday=agendaDate.getTime()===today.getTime();
  const now=nowMins();

  let body='';
  if(day===0){
    body=`<div class="rest-day"><div style="font-size:36px;margin-bottom:16px">🌿</div><div class="rest-title">Rustdag</div><div class="rest-sub">Geen taken vandaag.<br>Laden voor de week.</div></div>`;
  }else{
    body=slots.map(sl=>{
      const isPast=isToday&&timeMins(sl.end)<=now;
      const isActive=isToday&&timeMins(sl.start)<=now&&timeMins(sl.end)>now;
      const stasks=dayTasks.filter(t=>t.scheduledTime&&t.scheduledTime>=sl.start&&t.scheduledTime<sl.end).sort((a,b)=>taskScore(b)-taskScore(a));
      const used=stasks.reduce((s,t)=>s+(t.duration||30),0);
      const free=sl.dur-used;
      return`<div class="slot-block${isPast?' slot-past':''}">
        <div class="slot-header">
          <span class="slot-time">${sl.start}–${sl.end}</span>
          <span class="slot-label">${sl.label}${isActive?' · Nu bezig':''}${isPast?' · Voorbij':''}</span>
          ${free>0&&!isPast?`<span class="slot-free">${free}m vrij</span>`:''}
        </div>
        ${stasks.length===0
          ?`<div class="slot-empty">${isPast?'Niets ingepland':'Geen taken voor dit slot'}</div>`
          :stasks.map(t=>{
            const s=taskScore(t);const sc=scoreColor(s);const ec=EC[t.energy]||EC.medium;
            return`<div class="agenda-task">
              <button class="atask-check" onclick="completeTask(${t.id})">○</button>
              <div class="atask-body">
                <div class="atask-time">${t.scheduledTime} <span class="atask-note">richtlijn</span></div>
                <div class="atask-txt">${t.text}</div>
              </div>
              <div class="atask-right">
                <span class="score-dot" style="background:${sc.bg};color:${sc.fg}">${s.toFixed(1)}</span>
                <span class="dur-tag">${t.duration||30}m</span>
              </div>
            </div>`;
          }).join('')}
      </div>`;
    }).join('');
    if(!slots.length)body=`<div class="empty" style="padding:40px 24px"><div class="empty-t">Geen vrije slots</div><div class="empty-s">Zaterdag: 13:00–17:00 · Zondag: rustdag</div></div>`;
  }

  container.innerHTML=`
    <div class="day-nav">
      <button class="day-btn" onclick="agendaDate=new Date(agendaDate);agendaDate.setDate(agendaDate.getDate()-1);render()">←</button>
      <div class="day-center">
        <div class="day-name">${isToday?'Vandaag · ':''}${DAYS[day]}</div>
        <div class="day-date">${agendaDate.getDate()} ${MONTHS[agendaDate.getMonth()]} ${agendaDate.getFullYear()}</div>
        ${day!==0&&day!==6?`<div class="shift-pill">${shift==='vroeg'?'Vroege shift':'Late shift'}</div>`:''}
      </div>
      <button class="day-btn" onclick="agendaDate=new Date(agendaDate);agendaDate.setDate(agendaDate.getDate()+1);render()">→</button>
    </div>
    ${!isToday?`<div style="padding:0 16px 12px"><button class="ghost" style="width:100%" onclick="agendaDate=new Date();agendaDate.setHours(0,0,0,0);render()">← Vandaag</button></div>`:''}
    <div class="agenda-body">${body}</div>`;
}

function rAgendaMaand(container){
  const today=new Date();today.setHours(0,0,0,0);
  const year=calMonth.getFullYear();const month=calMonth.getMonth();
  const firstDay=new Date(year,month,1);
  const lastDay=new Date(year,month+1,0);
  // Start grid on Monday
  let startDow=firstDay.getDay();if(startDow===0)startDow=7;startDow--;
  const days=[];
  for(let i=0;i<startDow;i++){const d=new Date(firstDay);d.setDate(d.getDate()-startDow+i);days.push({date:d,cur:false});}
  for(let d=1;d<=lastDay.getDate();d++)days.push({date:new Date(year,month,d),cur:true});
  const rem=days.length%7;if(rem>0){for(let i=1;i<=7-rem;i++){days.push({date:new Date(year,month+1,i),cur:false});}}

  const tasksByDate={};
  tasks.forEach(t=>{if(t.scheduledDate){if(!tasksByDate[t.scheduledDate])tasksByDate[t.scheduledDate]=[];tasksByDate[t.scheduledDate].push(t);}});

  const daysCells=days.map(({date,cur})=>{
    const ds=fmtDate(date);
    const isToday=date.getTime()===today.getTime();
    const isSelected=date.getTime()===agendaDate.getTime();
    const isSun=date.getDay()===0;
    const dayTasks=tasksByDate[ds]||[];
    const dots=dayTasks.slice(0,4).map(t=>{const s=taskScore(t);const sc=scoreColor(s);return`<div class="cal-dot" style="background:${sc.fg}"></div>`;}).join('');
    const cls=['cal-day',!cur?'other-month':'',isToday?'today':'',isSelected?'selected-day':'',isSun?'sunday':''].filter(Boolean).join(' ');
    return`<div class="${cls}" onclick="${isSun?'':'agendaDate=new Date(\''+ds+'T00:00:00\');agendaView=\'dag\';render()'}">
      <div class="cal-day-num">${date.getDate()}</div>
      <div class="cal-dots">${dots}</div>
    </div>`;
  }).join('');

  container.innerHTML=`
    <div class="month-nav">
      <button class="day-btn" onclick="calMonth.setMonth(calMonth.getMonth()-1);render()">←</button>
      <div class="month-name">${MONTHS[month]} ${year}</div>
      <button class="day-btn" onclick="calMonth.setMonth(calMonth.getMonth()+1);render()">→</button>
    </div>
    <div class="cal-grid">
      <div class="cal-weekdays">
        ${['Ma','Di','Wo','Do','Vr','Za','Zo'].map(d=>`<div class="cal-wd">${d}</div>`).join('')}
      </div>
      <div class="cal-days">${daysCells}</div>
    </div>
    <div style="padding:12px 16px 0">
      <button class="ghost" style="width:100%" onclick="agendaDate=new Date();agendaDate.setHours(0,0,0,0);agendaView='dag';render()">← Vandaag</button>
    </div>`;
}

// ── IDEEËN ──
function rIdeeen(m){
  const groups={};
  ideas.forEach(i=>{if(!groups[i.subcategory])groups[i.subcategory]=[];groups[i.subcategory].push(i);});
  const sorted=Object.entries(groups).sort((a,b)=>{
    const ha=a[1].filter(x=>x.potential==='high').length/a[1].length;
    const hb=b[1].filter(x=>x.potential==='high').length/b[1].length;
    return hb-ha;
  });
  const html=ideas.length===0
    ?`<div class="empty"><div class="empty-ico">💡</div><div class="empty-t">Nog geen ideeën</div><div class="empty-s">Dump gedachten en de AI sorteert automatisch</div></div>`
    :sorted.map(([cat,ci])=>`
      <div class="group-label">${cat}</div>
      ${ci.sort((a,b)=>({high:3,medium:2,low:1}[b.potential]||2)-({high:3,medium:2,low:1}[a.potential]||2)).map(i=>{
        const pc=PC[i.potential]||PC.medium;
        const isEditing=editingIdeaId===i.id;
        return`<div class="idea-card${isEditing?' editing':''}">
          <div class="idea-top">
            <div class="idea-body">
              <div class="idea-txt">${i.text}</div>
              <span class="pot-tag" style="background:${pc.bg};color:${pc.fg}">Potentieel: ${i.potential}</span>
            </div>
            <div class="idea-actions">
              <button class="idea-btn edit" onclick="startEditIdea(${i.id})">✏</button>
              <button class="idea-btn del" onclick="deleteIdea(${i.id})">✕</button>
            </div>
          </div>
          ${isEditing?`<div class="idea-edit-wrap">
            <div class="edit-label">✏ Idee herschrijven</div>
            <textarea class="edit-inp" id="idea-inp-${i.id}" rows="2" style="resize:none">${i.text}</textarea>
            <div class="edit-actions">
              <button class="edit-save" onclick="saveEditIdea(${i.id})">Opslaan</button>
              <button class="edit-cancel" onclick="cancelEditIdea()">Annuleer</button>
            </div>
          </div>`:''}
        </div>`;
      }).join('')}`).join('');

  m.innerHTML=`<div class="ideeen screen">
    <div class="page-hdr"><h2>Ideeën</h2><span class="sub">${ideas.length} ideeën</span></div>
    <div class="idea-list">${html}</div>
  </div>`;

  ideas.forEach(i=>{
    if(editingIdeaId===i.id){
      const inp=$('idea-inp-'+i.id);
      if(inp){
        inp.addEventListener('keydown',e=>{
          if(e.key==='Enter'){e.preventDefault();saveEditIdea(i.id);}
          if(e.key==='Escape'){cancelEditIdea();}
        });
      }
    }
  });
}

// ── FOCUS ──
function rFocus(m){
  const dashOff=(CIRC*(secs/maxSecs)).toFixed(2);
  const ec=EC[taskEnergy]||EC.medium;
  const bd=taskObj?.breakdown||[];
  m.innerHTML=`<div class="focus screen">
    <div class="focus-bg"></div>
    <div class="glow ${running?'active':''}"></div>
    <div class="focus-eye">Nu bezig</div>
    ${task?`<div class="focus-task">${task}</div><div class="focus-energy" style="color:${ec.fg}">${taskEnergy} energy · ${maxSecs===15*60?'15':'25'} min sprint</div>`:`<div class="focus-none">Kies een taak via Taken</div>`}
    ${bd.length>0?`<div class="focus-startschot">
      <div class="startschot-label">▶ Aanpak — start hier</div>
      ${bd.map((s,i)=>`<div class="startschot-step"><span class="ss-num">${i+1}</span><span class="ss-txt">${s}</span></div>`).join('')}
    </div>`:''}
    <div class="rw">
      <svg class="ring" width="114" height="114" viewBox="0 0 114 114">
        <circle class="rbg" cx="57" cy="57" r="50"/>
        <circle class="rfill" id="rfill" cx="57" cy="57" r="50" stroke-dasharray="${CIRC.toFixed(2)}" stroke-dashoffset="${dashOff}"/>
      </svg>
      <div class="rov"><div class="rtime" id="rtime">${fmt(secs)}</div><div class="rlabel">pomodoro</div></div>
    </div>
    <div class="trow">
      <button class="tbtn ${!running?'go':''}" onclick="${running?'pauseTimer()':'startTimer()'}" ${!task?'disabled':''}>${running?'Pauzeer':secs===maxSecs?'Start':'Hervat'}</button>
      <button class="tbtn" onclick="resetTimer()" ${!task?'disabled':''}>Reset</button>
      ${task?`<button class="tbtn cancel-btn" onclick="cancelFocus()">Annuleer</button>`:''}
    </div>
    <div class="audio-row">
      <button class="abtn ${noiseActive&&noiseType==='brown'?'on':''}" onclick="toggleNoise('brown')">Brown noise</button>
      <button class="abtn ${noiseActive&&noiseType==='binaural'?'on':''}" onclick="toggleNoise('binaural')">Binaural 40Hz</button>
    </div>
    <div class="park-zone">
      ${!showPark?`<div class="park-row-btns">
        <button class="ptrig" onclick="showPark=true;render()"><span class="pplus">+</span><span>Gedachte parkeren...</span></button>
        <button class="mic-park" id="micpark" onclick="toggleParkMic()">🎙</button>
      </div>`:`<div class="pinprow">
        <input class="pinp" id="pinp" placeholder="Typ de gedachte..." value="${parkInput}">
        <button class="psave" onclick="parkInput=$('pinp').value;addParked()">Park</button>
      </div>`}
      ${parked.length>0?`<div class="ptally">${parked.length} geparkeerd · <a onclick="nav('taken');return false" href="#">bekijk →</a></div>`:''}
    </div>
  </div>`;
  if(showPark&&!parkListening)setTimeout(()=>{
    const pi=$('pinp');if(!pi)return;
    pi.focus();pi.addEventListener('input',e=>parkInput=e.target.value);
    pi.addEventListener('keydown',e=>{if(e.key==='Enter'){parkInput=pi.value;addParked();}if(e.key==='Escape'){showPark=false;render();}});
  },0);
}

// ── KEYBOARD ──
document.addEventListener('keydown',e=>{
  if((e.metaKey||e.ctrlKey)&&e.key==='Enter'&&screen==='dump'&&dumpText.trim())runTriage();
  if((e.metaKey||e.ctrlKey)&&e.key==='m'&&screen==='dump')toggleMic();
  if(e.key==='Escape'){
    if(editingTaskId||editingIdeaId){cancelEditTask();cancelEditIdea();}
    else if(showPark){showPark=false;render();}
    else if(listening)stopMic();
    else if(selectedTaskId){selectedTaskId=null;render();}
  }
});

// ── INIT ──
loadState();scheduleAll();
const sp=new URLSearchParams(window.location.search).get('screen');
if(sp==='focus'&&task)screen='focus';else if(sp==='dump')screen='dump';
['n0','n1','n2','n3','n4'].forEach(id=>$(id)?.classList.remove('on'));
const nm={dump:'n0',taken:'n1',agenda:'n2',ideeen:'n3',focus:'n4'};
$(nm[screen]||'n0')?.classList.add('on');
render();
</script>
</body>
</html>
